name: Publish HTML Slides

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必須有這行才能解決 exit code 128
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false  # 強制關閉子模組檢查，解決 .gitmodules 錯誤

      - name: Install Emacs & Maxima
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox maxima

      - name: Generate HTML Slides
        run: |
          mkdir -p ~/.emacs.d
          emacs --batch -l publish.el calculation.org -f org-reveal-export-to-html

      - name: Setup Reveal.js (Clean Install)
        run: |
          # 刪除可能存在的殘留資料夾，重新乾淨下載
          rm -rf reveal.js
          git clone --depth 1 https://github.com/hakimel/reveal.js.git

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          enable_jekyll: false
